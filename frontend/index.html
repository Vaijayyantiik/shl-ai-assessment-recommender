<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SHL AI Assessment Recommender</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

            font-family: Arial, sans-serif;
        }

        body {

            background: #081229;

            color: white;

            padding: 30px;
        }

        .container {

            max-width: 1100px;

            margin: auto;
        }

        .chat-container {

            background: #0d1835;

            border-radius: 25px;

            overflow: hidden;

            border: 1px solid rgba(255,255,255,0.1);
        }

        .header {

            background: rgba(255,255,255,0.08);

            padding: 25px;

            font-size: 22px;

            font-weight: bold;
        }

        .chat-box {

            height: 450px;

            overflow-y: auto;

            padding: 25px;

            display: flex;

            flex-direction: column;

            gap: 20px;
        }

        .message {

            max-width: 75%;

            padding: 20px;

            border-radius: 20px;

            line-height: 1.6;

            font-size: 18px;
        }

        .bot-message {

            background: rgba(255,255,255,0.08);

            align-self: flex-start;
        }

        .user-message {

            background: #2f6df6;

            align-self: flex-end;
        }

        .timestamp {

            margin-top: 10px;

            font-size: 12px;

            opacity: 0.7;
        }

        .input-area {

            display: flex;

            padding: 20px;

            gap: 15px;

            border-top: 1px solid rgba(255,255,255,0.08);
        }

        input {

            flex: 1;

            padding: 18px;

            border-radius: 15px;

            border: none;

            outline: none;

            background: rgba(255,255,255,0.08);

            color: white;

            font-size: 18px;
        }

        button {

            padding: 18px 28px;

            border: none;

            border-radius: 15px;

            background: #2f6df6;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: 0.3s ease;
        }

        button:hover {

            background: #1f57d6;
        }

        .recommendation-section {

            margin-top: 35px;

            background: #0d1835;

            border-radius: 25px;

            padding: 30px;

            border: 1px solid rgba(255,255,255,0.08);
        }

        .recommendation-section h2 {

            margin-bottom: 25px;

            font-size: 22px;
        }

        .recommendation-card {

            background: rgba(255,255,255,0.08);

            padding: 25px;

            border-radius: 20px;

            margin-bottom: 20px;

            transition: 0.3s ease;
        }

        .recommendation-card:hover {

            transform: translateY(-5px);
        }

        .recommendation-card h3 {

            margin-bottom: 15px;
        }

        .recommendation-card a {

            color: #4ea1ff;

            text-decoration: none;
        }

        .badge-container {

            display: flex;

            gap: 10px;

            margin-top: 18px;
        }

        .badge {

            display: inline-block;

            padding: 8px 14px;

            border-radius: 20px;

            background: #2f6df6;

            font-size: 13px;
        }

        .skill-badge {

            background: #1f8ef1;
        }

        .spinner {

            width: 15px;

            height: 15px;

            border: 3px solid rgba(255,255,255,0.2);

            border-top: 3px solid white;

            border-radius: 50%;

            animation: spin 1s linear infinite;

            display: inline-block;

            margin-right: 10px;
        }

        @keyframes spin {

            0% {

                transform: rotate(0deg);
            }

            100% {

                transform: rotate(360deg);
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="chat-container">

            <div class="header">

                SHL AI Assessment Recommender

            </div>

            <div class="chat-box" id="chatBox">

                <div class="message bot-message">

                    Hello 👋

                    <br><br>

                    Tell me about the role or skills you are hiring for.

                    <div class="timestamp">

                        <script>

                            document.write(

                                new Date().toLocaleTimeString([], {

                                    hour: '2-digit',

                                    minute: '2-digit'
                                })
                            )

                        </script>

                    </div>

                </div>

            </div>

            <div class="input-area">

                <input

                    type="text"

                    id="userInput"

                    placeholder="Example: Hiring Python backend engineer"
                >

                <button onclick="sendMessage()">

                    Send

                </button>

            </div>

        </div>

        <div class="recommendation-section">

            <h2>

                Recommended Assessments

            </h2>

            <div id="recommendationBox">

                Recommendations will appear here.

            </div>

        </div>

    </div>

    <script>

        let messages = []


        function getTime() {

            return new Date().toLocaleTimeString([], {

                hour: '2-digit',

                minute: '2-digit'
            })
        }


        async function sendMessage() {

            const input = document.getElementById("userInput")

            const message = input.value.trim()

            if (!message) return


            const chatBox = document.getElementById("chatBox")

            const recommendationBox = document.getElementById("recommendationBox")


            chatBox.innerHTML += `

                <div class="message user-message">

                    ${message}

                    <div class="timestamp">

                        ${getTime()}

                    </div>

                </div>

            `


            messages.push({

                role: "user",

                content: message
            })


            input.value = ""


            chatBox.innerHTML += `

                <div class="message bot-message" id="loadingMessage">

                    <div class="spinner"></div>

                    Thinking...

                </div>

            `


            chatBox.scrollTop = chatBox.scrollHeight


            const response = await fetch(

                "http://127.0.0.1:8000/chat",

                {

                    method: "POST",

                    headers: {

                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        messages: messages
                    })
                }
            )


            const data = await response.json()


            document.getElementById(

                "loadingMessage"
            ).remove()


            chatBox.innerHTML += `

                <div class="message bot-message">

                    ${data.reply}

                    <div class="timestamp">

                        ${getTime()}

                    </div>

                </div>

            `


            recommendationBox.innerHTML = ""


            data.recommendations.forEach(item => {

                recommendationBox.innerHTML += `

                    <div class="recommendation-card">

                        <h3>

                            ${item.name}

                        </h3>

                        <a href="${item.url}" target="_blank">

                            View Assessment

                        </a>

                        <div class="badge-container">

                            <span class="badge">

                                ${item.test_type}

                            </span>

                            <span class="badge skill-badge">

                                AI Recommended

                            </span>

                        </div>

                    </div>

                `
            })


            chatBox.scrollTop = chatBox.scrollHeight
        }

    </script>

</body>

</html>
